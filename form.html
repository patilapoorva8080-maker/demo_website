<html>
    <head>
        <title>FORM</title>
    </head>

   <body>
    <form name="form1" action="#" method="get" id="formdata" enctype="multipart/form-data">

        <label>Full Name:</label>
        <input type="text" name="fullname" id="f_name" value="" placeholder="Please enter full name"><br>
         
        <label>Email:</label>
        <input type="text" name="email" id="e_id" value="" placeholder="Please enter your email"><br>
        <label>Password:</label>
        <input type="password" name="password" id="pass_id" value="" placeholder="Please enter password"><br>
        <label>Date of Birth:</label>
        <input type="date" name="birthdate" id="DOB" value="" ><br>
        <label>Mobile Number:</label>
        <input type="text" name="mobileno" id="mob" value="" placeholder="Please enter Mobile Number"><br>
        <label>Address:</label>
        <textarea name:"address" rows="5" cols="5">   </textarea><br>
        <label>Gender:</label>
        <input type="radio" name="gender" value="M">MALE
        <input type="radio" name="gender" value="F">FEMALE<br>
        <label>Qualification:</label>
        <input type="checkbox" name="Qualification" value="G">GRADUATE
        <input type="checkbox" name="Qualification" value="PG">POST GRADUATE<br>
        <label>Blood Group: </label>
           <select name="bloodgroup" id="bgroup" size="4">
            <option value="">select</option>
            <option value="A">A</option>
        <option value="B">B</option>
        <option value="AB">AB</option>
        <option value="AB-">AB-</option>
        <option value="O-">O-</option>
        <option value="O+">O+</option>
        </select><br>

        <label>Upload File</label>
        <input type="file" name="uploadfile" id="upload"><br>

        <input type="reset" name="Reset" value="RESET">
        <input type="submit" name="Submit" value="SUBMIT">



        
        

        

    
    
    
    
    </form>
   </body>

</html>
